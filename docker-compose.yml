services:
  build:
    build:
      context: .
      dockerfile: Dockerfile.build
    working_dir: /app
    volumes:
      - .:/app
      - maven-cache:/root/.m2
    profiles: ["tools"]

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: demodb
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/demodb
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  mysqldata:
  maven-cache:
